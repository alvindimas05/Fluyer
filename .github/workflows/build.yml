        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-${{ runner.arch }}-node-${{ hashFiles('**/bun.lockb') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-node-
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      - name: Install NDK
        run: sdkmanager "ndk;28.0.13004108"
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: i686-linux-android
      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'
      - name: Setup Workflow
        shell: bash
        env:
          ANDROID_ARCH: i686
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_KEY_BASE64: ${{ secrets.ANDROID_KEY_BASE64 }}
          RUNNER_TEMP: ${{ runner.temp }}
          NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/28.0.13004108
        run: bash infra/android.sh
      - name: Rename Android APK
        run: mv ./src-tauri/gen/android/app/build/outputs/apk/universal/release/app-universal-release.apk ./Fluyer_${{ needs.prepare.outputs.version }}_i686.apk
      - name: Upload artifact
        if: ${{ !inputs.release_build }}
        uses: actions/upload-artifact@v4
        with:
          name: android-i686
          path: ./Fluyer_*_i686.apk
      - name: Publish release
        if: ${{ inputs.release_build }}
        uses: ncipollo/release-action@v1
        with:
          artifacts: ./Fluyer_*_i686.apk
          tag: v${{ needs.prepare.outputs.version }}
          name: Fluyer v${{ needs.prepare.outputs.version }}
          allowUpdates: true
          omitBodyDuringUpdate: true
          prerelease: true
